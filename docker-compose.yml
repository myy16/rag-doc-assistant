version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: p2p_yzta_backend
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

volumes:
  uploads_data: